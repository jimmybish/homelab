---
# Playbook to update all Docker Compose containers to the latest version
# Equivalent to: docker compose pull && docker compose up -d

- name: Update all Docker Compose containers
  hosts:
    - ubuntu
  become: true
  tasks:
    - name: Find all docker-compose.yaml files
      ansible.builtin.find:
        paths: "{{ docker_storage_folder }}"
        patterns: "docker-compose.yaml,docker-compose.yml"
        recurse: true
      register: compose_files

    - name: Set list of valid compose projects (parent directories)
      ansible.builtin.set_fact:
        valid_compose_projects: "{{ compose_files.files | map(attribute='path') | map('dirname') | unique | list }}"

    - name: Remove stopped containers for each project
      community.docker.docker_prune:
        containers: true
      failed_when: false

    - name: Pull latest images (docker compose v2)
      community.docker.docker_compose_v2_pull:
        project_src: "{{ item }}"
      loop: "{{ valid_compose_projects }}"
      ignore_errors: true
      register: pull_results

    - name: Bring up containers (docker compose v2)
      community.docker.docker_compose_v2:
        project_src: "{{ item }}"
        state: present
        remove_orphans: true
      loop: "{{ valid_compose_projects }}"
      ignore_errors: true
      register: up_results

    - name: Show pull results
      ansible.builtin.debug:
        var: pull_results

    - name: Show up results
      ansible.builtin.debug:
        var: up_results
