---
- name: Restart chrony
  ansible.builtin.service:
    name: chrony
    state: restarted

- name: Restart fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: restarted

- name: Remove subscription nag
  ansible.builtin.command:
    cmd: /usr/local/bin/pve-remove-nag.sh
  changed_when: true

- name: Refresh Proxmox boot config
  ansible.builtin.command:
    cmd: proxmox-boot-tool refresh
  changed_when: true
