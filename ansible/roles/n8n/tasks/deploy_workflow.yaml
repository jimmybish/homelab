---
- name: Render workflow JSON  # {{ workflow.name }}
  ansible.builtin.set_fact:
    _workflow_json: "{{ lookup('template', workflow.template) }}"

- name: Find existing workflow  # {{ workflow.name }}
  ansible.builtin.set_fact:
    _workflow_id: "{{ (n8n_workflows.json.data | selectattr('name', 'equalto', workflow.name) | list | first).id | default('') }}"
  failed_when: false

- name: Create workflow  # {{ workflow.name }}
  ansible.builtin.uri:
    url: "{{ internal_n8n_url }}/api/v1/workflows"
    method: POST
    headers:
      X-N8N-API-KEY: "{{ n8n_api_key }}"
      Content-Type: "application/json"
    body: "{{ _workflow_json }}"
    body_format: json
    validate_certs: false
    status_code: [200, 201]
  register: _workflow_created
  delegate_to: localhost
  when: _workflow_id | default('') == ''

- name: Set workflow ID from creation  # {{ workflow.name }}
  ansible.builtin.set_fact:
    _workflow_id: "{{ _workflow_created.json.id }}"
  when: _workflow_created is not skipped and _workflow_created is succeeded

- name: Deactivate workflow before update  # {{ workflow.name }}
  ansible.builtin.uri:
    url: "{{ internal_n8n_url }}/api/v1/workflows/{{ _workflow_id }}/deactivate"
    method: POST
    headers:
      X-N8N-API-KEY: "{{ n8n_api_key }}"
    validate_certs: false
    status_code: [200]
  delegate_to: localhost
  when:
    - _workflow_id | default('') != ''
    - _workflow_created is skipped
    - workflow.active | default(false)

- name: Update workflow  # {{ workflow.name }}
  ansible.builtin.uri:
    url: "{{ internal_n8n_url }}/api/v1/workflows/{{ _workflow_id }}"
    method: PUT
    headers:
      X-N8N-API-KEY: "{{ n8n_api_key }}"
      Content-Type: "application/json"
    body: "{{ _workflow_json }}"
    body_format: json
    validate_certs: false
    status_code: [200]
  delegate_to: localhost
  when: _workflow_id | default('') != '' and _workflow_created is skipped
