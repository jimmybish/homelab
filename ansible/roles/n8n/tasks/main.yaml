# Webhook Auth Credential (for Grafana webhook authentication)
- name: Find existing Grafana Webhook Auth credential
  ansible.builtin.set_fact:
    webhook_auth_credential_id: "{{ (n8n_credentials.json.data | selectattr('name', 'equalto', 'Grafana Webhook Auth') | list | first).id | default('') }}"
  failed_when: false

- name: Create Grafana Webhook Auth credential
  ansible.builtin.uri:
    url: "{{ internal_n8n_url }}/api/v1/credentials"
    method: POST
    headers:
      X-N8N-API-KEY: "{{ n8n_api_key }}"
      Content-Type: "application/json"
    body:
      name: "Grafana Webhook Auth"
      type: "httpHeaderAuth"
      data:
        name: "Authorization"
        value: "Bearer {{ grafana_webhook_secret }}"
    body_format: json
    validate_certs: false
    status_code: [200, 201]
  register: webhook_auth_credential_created
  delegate_to: localhost
  when: webhook_auth_credential_id | default('') == ''

- name: Set Webhook Auth credential ID from creation
  ansible.builtin.set_fact:
    webhook_auth_credential_id: "{{ webhook_auth_credential_created.json.id }}"
  when: webhook_auth_credential_created is not skipped

- name: Update Grafana Webhook Auth credential
  ansible.builtin.uri:
    url: "{{ internal_n8n_url }}/api/v1/credentials/{{ webhook_auth_credential_id }}"
    method: PATCH
    headers:
      X-N8N-API-KEY: "{{ n8n_api_key }}"
      Content-Type: "application/json"
    body:
      name: "Grafana Webhook Auth"
      type: "httpHeaderAuth"
      data:
        name: "Authorization"
        value: "Bearer {{ grafana_webhook_secret }}"
    body_format: json
    validate_certs: false
    status_code: [200]
  delegate_to: localhost
  when: webhook_auth_credential_id | default('') != '' and webhook_auth_credential_created is skipped

# Deploy workflows
- name: List existing N8N workflows
  ansible.builtin.uri:
    url: "{{ internal_n8n_url }}/api/v1/workflows"
    method: GET
    headers:
      X-N8N-API-KEY: "{{ n8n_api_key }}"
    validate_certs: false
    return_content: true
  register: n8n_workflows
  delegate_to: localhost

- name: Deploy N8N workflows
  ansible.builtin.include_tasks:
    file: deploy_workflow.yaml
  loop:
    - name: "Copilot CLI Test"
      template: "templates/copilot_workflow.json.j2"
    - name: "Discord VirtuaJimmy"
      template: "templates/discord_copilot_workflow.json.j2"
      active: true
    - name: "Discord Plexibot"
      template: "templates/discord_plexibot_workflow.json.j2"
      active: true
    - name: "Grafana Alert Handler"
      template: "templates/grafana_alerts_workflow.json.j2"
      active: true
    - name: "Copilot Still Thinking"
      template: "templates/copilot_still_thinking_workflow.json.j2"
      active: true
    - name: "Close Stale Discord Threads"
      template: "templates/close_stale_threads_workflow.json.j2"
      active: true
    - name: "Create Weekly Changelog Folder"
      template: "templates/create_weekly_changelog_workflow.json.j2"
      active: true
    - name: "Log Monitor"
      template: "templates/log_monitor_workflow.json.j2"
      active: true
    - name: "CVE Monitor"
      template: "templates/cve_monitor_workflow.json.j2"
      active: true
    - name: "Plex Library Announcements"
      template: "templates/plex_announcements_workflow.json.j2"
      active: true
  loop_control:
    loop_var: workflow

# Activate workflows — done as a batch after all deploys so Discord trigger
# IPC connections are established together (cycling one orphans the other)
- name: Refresh workflow list after deploy
  ansible.builtin.uri:
    url: "{{ internal_n8n_url }}/api/v1/workflows"
    method: GET
    headers:
      X-N8N-API-KEY: "{{ n8n_api_key }}"
    validate_certs: false
    return_content: true
  register: n8n_workflows_post
  delegate_to: localhost

- name: Activate workflows
  ansible.builtin.uri:
    url: "{{ internal_n8n_url }}/api/v1/workflows/{{ (n8n_workflows_post.json.data | selectattr('name', 'equalto', item) | first).id }}/activate"
    method: POST
    headers:
      X-N8N-API-KEY: "{{ n8n_api_key }}"
    validate_certs: false
    status_code: [200]
  delegate_to: localhost
  loop:
    - "Discord VirtuaJimmy"
    - "Discord Plexibot"
    - "Grafana Alert Handler"
    - "Copilot Still Thinking"
    - "Close Stale Discord Threads"
    - "Create Weekly Changelog Folder"
    - "Log Monitor"
    - "CVE Monitor"
    - "Plex Library Announcements"
