---
- name: Ensure docker-compose is installed
  ansible.builtin.package:
    name: docker-compose
    state: present

- name: Ensure Docker service is running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Setup Jellyfin directory
  ansible.builtin.file:
    path: "{{ jellyfin_folder }}/config"
    state: directory
    mode: '0755'
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"

- name: Allow Jellyfin HTTP port through UFW
  community.general.ufw:
    rule: allow
    port: "{{ jellyfin_port }}"
    proto: tcp
  when: ansible_os_family == "Debian"

- name: Allow Jellyfin HTTPS port through UFW
  community.general.ufw:
    rule: allow
    port: "{{ jellyfin_https_port }}"
    proto: tcp
  when: ansible_os_family == "Debian"

- name: Allow Jellyfin UDP port 1 through UFW
  community.general.ufw:
    rule: allow
    port: "{{ jellyfin_udp_port1 }}"
    proto: udp
  when: ansible_os_family == "Debian"

- name: Get fileserver hostname
  ansible.builtin.set_fact:
    jellyfin_fileserver_ip: "{{ (lookup('ansible.builtin.inventory_hostnames', 'qnap').split(','))[0] }}"

- name: Deploy Jellyfin using Docker Compose
  ansible.builtin.template:
    src: "templates/docker_compose.yaml.j2"
    dest: "{{ jellyfin_folder }}/docker-compose.yaml"
    mode: '0755'
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    force: true
  notify:
    - Start Jellyfin

- name: Run Jellyfin docker-compose up
  community.docker.docker_compose_v2:
    project_src: "{{ jellyfin_folder }}"
    state: present
    remove_orphans: true

# Check if Jellyfin ports are open and listening
- name: Check if Jellyfin ports are open and listening
  community.general.listen_ports_facts:

- name: Assert Jellyfin ports are listening
  ansible.builtin.assert:
    that:
      - jellyfin_port | int in (ansible_facts.tcp_listen | map(attribute='port') | list)
      - jellyfin_https_port | int in (ansible_facts.tcp_listen | map(attribute='port') | list)
      - jellyfin_udp_port1 | int in (ansible_facts.udp_listen | map(attribute='port') | list)
    fail_msg: "One or more Jellyfin ports are not open and listening!"
    success_msg: "All Jellyfin ports are open and listening."

# Proxy Configuration
- name: Resolve jellyfin host IP for proxy configuration
  ansible.builtin.set_fact:
    jellyfin_proxy_ip: "{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}"
  when: jellyfin_configure_proxy | default(true)

- name: Deploy Jellyfin nginx config to SWAG Internal
  ansible.builtin.template:
    src: jellyfin.subdomain.conf.j2
    dest: "{{ proxy_folder }}/internal/nginx/proxy-confs/jellyfin.subdomain.conf"
    mode: '0644'
  delegate_to: "{{ groups['proxy_host'][0] }}"
  notify:
    - Restart Swag Internal
  when: jellyfin_configure_proxy | default(true)

# DNS Configuration
- name: Ensure deployment host DNS override exists
  ansible.builtin.include_tasks:
    file: "{{ playbook_dir }}/tasks/pfsense_dns_ensure_host_override.yaml"
  vars:
    _dns_configure: "{{ jellyfin_configure_dns | default(true) }}"
  when: jellyfin_configure_dns | default(true)

- name: Create jellyfin DNS alias
  ansible.builtin.include_tasks:
    file: "{{ playbook_dir }}/tasks/pfsense_dns_create_alias.yaml"
  vars:
    _dns_configure: "{{ jellyfin_configure_dns | default(true) }}"
    _dns_alias_host: jellyfin
    _dns_alias_descr: Jellyfin media server
    _dns_is_proxied: true
  when: jellyfin_configure_dns | default(true)

# Homepage Configuration
- name: Add Jellyfin services to Homepage Media section
  ansible.builtin.include_tasks:
    file: "{{ playbook_dir }}/tasks/homepage_add_service.yaml"
  vars:
    _homepage_service_name: Jellyfin
    _homepage_marker: jellyfin services
    _homepage_template: jellyfin_services.yaml.j2
    _homepage_insertafter: "^- Media:"
  when: jellyfin_configure_homepage | default(true)
  tags:
    - homepage
    - homepage_config

- name: Notify Homepage restart for jellyfin
  ansible.builtin.debug:
    msg: "jellyfin homepage entry updated"
  changed_when: _homepage_service_result is changed
  notify:
    - Restart Homepage
  when: jellyfin_configure_homepage | default(true)
  tags:
    - homepage
    - homepage_config
