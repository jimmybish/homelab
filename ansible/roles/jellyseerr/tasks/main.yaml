---
- name: Ensure docker-compose is installed
  ansible.builtin.package:
    name: docker-compose
    state: present

- name: Ensure Docker service is running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Setup Jellyseerr directory
  ansible.builtin.file:
    path: "{{ jellyseerr_folder }}"
    state: directory
    mode: '0755'
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"

- name: Allow Jellyseerr port through UFW
  community.general.ufw:
    rule: allow
    port: "{{ jellyseerr_port }}"
    proto: tcp
  when: ansible_os_family == "Debian"

- name: Deploy Jellyseerr using Docker Compose
  ansible.builtin.template:
    src: "templates/docker_compose.yaml.j2"
    dest: "{{ jellyseerr_folder }}/docker-compose.yaml"
    mode: '0644'
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    force: true
  notify:
    - Start Jellyseerr

- name: Run docker-compose up
  community.docker.docker_compose_v2:
    project_src: "{{ jellyseerr_folder }}"
    state: present
    remove_orphans: true

- name: Check if Jellyseerr ports are open and listening
  community.general.listen_ports_facts:

- name: Assert Jellyseerr ports are listening
  ansible.builtin.assert:
    that:
      - jellyseerr_port | int in (ansible_facts.tcp_listen | map(attribute='port') | list)
    fail_msg: "Jellyseerr port is not open and listening!"
    success_msg: "Jellyseerr port is open and listening."

# Configure SWAG Internal Proxy (REQUIRED for web interfaces)
- name: Resolve Jellyseerr host IP for proxy configuration
  ansible.builtin.set_fact:
    jellyseerr_proxy_ip: "{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}"

- name: Deploy Jellyseerr nginx config to SWAG Internal
  ansible.builtin.template:
    src: jellyseerr.subdomain.conf.j2
    dest: "{{ proxy_folder }}/internal/nginx/proxy-confs/jellyseerr.subdomain.conf"
    mode: '0644'
  delegate_to: "{{ groups['proxy_host'][0] }}"
  notify:
    - Restart Swag Internal

# DNS Configuration
- name: Ensure deployment host DNS override exists
  ansible.builtin.include_tasks:
    file: "{{ playbook_dir }}/tasks/pfsense_dns_ensure_host_override.yaml"
  vars:
    _dns_configure: "{{ jellyseerr_configure_dns | default(true) }}"
  when: jellyseerr_configure_dns | default(true)

- name: Create jellyseerr DNS alias
  ansible.builtin.include_tasks:
    file: "{{ playbook_dir }}/tasks/pfsense_dns_create_alias.yaml"
  vars:
    _dns_configure: "{{ jellyseerr_configure_dns | default(true) }}"
    _dns_alias_host: request
    _dns_alias_descr: "Jellyseerr (Media request management)"
    _dns_is_proxied: true
  when: jellyseerr_configure_dns | default(true)

# Configure Homepage Services (REQUIRED for web interfaces)
- name: Add Jellyseerr to Homepage section
  ansible.builtin.include_tasks:
    file: "{{ playbook_dir }}/tasks/homepage_add_service.yaml"
  vars:
    _homepage_service_name: Jellyseerr
    _homepage_marker: jellyseerr service
    _homepage_template: jellyseerr_service.yaml.j2
    _homepage_insertafter: "^- Media:"
  when: jellyseerr_configure_homepage | default(true)
  tags:
    - homepage
    - homepage_config

- name: Notify Homepage restart for jellyseerr
  ansible.builtin.debug:
    msg: "jellyseerr homepage entry updated"
  changed_when: _homepage_service_result is changed
  notify:
    - Restart Homepage
  when: jellyseerr_configure_homepage | default(true)
  tags:
    - homepage
    - homepage_config
