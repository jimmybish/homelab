---
# Research Notes - Grafana Stack
# Official Source: https://grafana.com/docs/grafana/latest/
# Docker Hub: https://hub.docker.com/r/grafana/grafana - Default port: 3000
# Loki: https://hub.docker.com/r/grafana/loki - Default port: 3100
# Prometheus: https://hub.docker.com/r/prom/prometheus - Default port: 9090
# InfluxDB: https://hub.docker.com/_/influxdb - Default port: 8086
# Example Compose: https://github.com/grafana/loki/tree/main/production/docker-compose
# NGINX Proxy Config: https://github.com/linuxserver/reverse-proxy-confs (grafana.subdomain.conf.sample available)
# Last Updated: 2025-10-08

grafana_version: "latest"
grafana_plugins: "grafana-clock-panel"
grafana_loki_version: "2.9.7"
grafana_prometheus_version: "v2.51.2"
grafana_influxdb_version: "2.7"

# External ports for each service (from official documentation)
grafana_port: 3000
grafana_loki_port: 3100
grafana_prometheus_port: 9090
grafana_influxdb_port: 8086

# Volume paths - organized under single parent folder
grafana_parent_folder: "{{ docker_storage_folder }}/grafana-stack"
grafana_folder: "{{ grafana_parent_folder }}/grafana"
grafana_loki_data_folder: "{{ grafana_parent_folder }}/loki"
grafana_prometheus_data_folder: "{{ grafana_parent_folder }}/prometheus"
grafana_influxdb_data_folder: "{{ grafana_parent_folder }}/influxdb"

# InfluxDB settings (set sensitive values in group_vars with vault encryption:
#   grafana_influxdb_admin_user, grafana_influxdb_admin_password, grafana_influxdb_admin_token)
grafana_influxdb_org: "homelab"
grafana_influxdb_bucket: "default"
grafana_influxdb_proxmox_org: "proxmox"
grafana_influxdb_proxmox_bucket: "proxmox"

# SNMP Exporter - for monitoring QNAP NAS and other SNMP devices
# Docker Hub: https://hub.docker.com/r/prom/snmp-exporter - Default port: 9116
# GitHub: https://github.com/prometheus/snmp_exporter
grafana_snmp_exporter_version: "v0.30.1"
grafana_snmp_exporter_port: 9116
grafana_snmp_exporter_data_folder: "{{ grafana_parent_folder }}/snmp-exporter"

# SNMP targets - list of devices to monitor
# Set snmpv3_username, snmpv3_auth_passphrase, snmpv3_priv_passphrase
# in group_vars/all/vars.yaml with vault encryption
grafana_snmp_targets:
  - name: "{{ groups['qnap'][0] }}"
    target: "{{ groups['qnap'][0] }}.{{ internal_domain }}"
    module: if_mib

# Alerting - webhook integration with N8N
grafana_alert_webhook_path: "grafana-alerts"

# Alerting - datasource UIDs (auto-generated by Grafana, queried from grafana.db)
grafana_prometheus_uid: "PBFA97CFB590B2093"
grafana_loki_uid: "P8E80F9AEF21F6940"

# Alerting - thresholds
grafana_alert_disk_threshold_local: 20    # Alert when local FS has <20% free (>80% used)
grafana_alert_disk_threshold_qnap: 5      # Alert when QNAP volume has <5% free (>95% used)
grafana_alert_qnap_temp_threshold: 55     # Alert when QNAP temp > 55°C
grafana_alert_loki_error_threshold: 10    # Alert when > 10 errors in 5m window

# Feature flags (ALL true - grafana has web interface)
grafana_configure_homepage: true
grafana_configure_proxy: true
grafana_configure_dns: true
