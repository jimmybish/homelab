---
# Research Notes - Grafana Stack
# Official Source: https://grafana.com/docs/grafana/latest/
# Docker Hub: https://hub.docker.com/r/grafana/grafana - Default port: 3000
# Loki: https://hub.docker.com/r/grafana/loki - Default port: 3100
# Prometheus: https://hub.docker.com/r/prom/prometheus - Default port: 9090
# InfluxDB: https://hub.docker.com/_/influxdb - Default port: 8086
# Example Compose: https://github.com/grafana/loki/tree/main/production/docker-compose
# NGINX Proxy Config: https://github.com/linuxserver/reverse-proxy-confs (grafana.subdomain.conf.sample available)
# Last Updated: 2025-10-08

grafana_version: "latest"
grafana_plugins: "grafana-clock-panel"
grafana_loki_version: "2.9.7"
grafana_prometheus_version: "v2.51.2"
grafana_influxdb_version: "2.7"

# External ports for each service (from official documentation)
grafana_port: 3000
grafana_loki_port: 3100
grafana_prometheus_port: 9090
grafana_influxdb_port: 8086

# Volume paths - organized under single parent folder
grafana_parent_folder: "{{ docker_storage_folder }}/grafana-stack"
grafana_folder: "{{ grafana_parent_folder }}/grafana"
grafana_loki_data_folder: "{{ grafana_parent_folder }}/loki"
grafana_prometheus_data_folder: "{{ grafana_parent_folder }}/prometheus"
grafana_influxdb_data_folder: "{{ grafana_parent_folder }}/influxdb"

# InfluxDB settings (set sensitive values in group_vars with vault encryption:
#   grafana_influxdb_admin_user, grafana_influxdb_admin_password, grafana_influxdb_admin_token)
grafana_influxdb_org: "homelab"
grafana_influxdb_bucket: "default"
grafana_influxdb_proxmox_org: "proxmox"
grafana_influxdb_proxmox_bucket: "proxmox"

# Alerting - webhook integration with N8N
grafana_alert_webhook_path: "grafana-alerts"

# Datasource UIDs - pinned so they are deterministic across rebuilds.
# These are referenced by provisioned dashboards and alert rules, so they
# must stay stable. Values match the UIDs Grafana originally auto-generated.
grafana_prometheus_uid: "PBFA97CFB590B2093"
grafana_loki_uid: "P8E80F9AEF21F6940"
grafana_influxdb_uid: "P951FEA4DE68E13C5"
grafana_influxdb_proxmox_uid: "PD46801E352F9449B"

# Alerting - thresholds
grafana_alert_disk_threshold_local: 20    # Alert when local FS has <20% free (>80% used)
grafana_alert_loki_error_threshold: 10    # Alert when > 10 errors in 5m window
grafana_alert_n8n_trigger_loop_threshold: 6  # Alert when > 6 trigger removals in 5m window
grafana_alert_nvme_temp_threshold: 68     # Alert when a Proxmox NVMe drive exceeds 68°C

# Feature flags (ALL true - grafana has web interface)
grafana_configure_homepage: true
grafana_configure_proxy: true
grafana_configure_dns: true

# ---------------------------------------------------------------------------
# Copilot / MCP service account automation
# ---------------------------------------------------------------------------
# The grafana role can ensure the "Copilot Grafana Admin" service account
# exists with an Admin token, validate the vaulted token on every deploy, and
# (when a new token is minted) write it back to the vault var + the VS Code MCP
# config automatically.
#
# Bootstrap model: by default the playbook authenticates with the EXISTING
# vaulted token (grafana_api_token). This validates/ensures on redeploys, where
# the service account + token persist in grafana.db. To self-heal on a brand-new
# volume (no token yet), set grafana_admin_user/grafana_admin_password (vaulted)
# so it can bootstrap via basic auth instead.
grafana_configure_service_account: true
grafana_service_account_name: "Copilot Grafana Admin"
grafana_service_account_role: "Admin"
grafana_service_account_token_name: "MGMT - MCP Server"

# Set true to force-mint a fresh token (and write it back) even if the current
# one is still valid. Normally false: a new token is only created when the
# vaulted token fails validation.
grafana_rotate_token: false

# Write-back targets for a newly minted token.
grafana_update_mcp_config: true
grafana_vault_vars_file: "{{ playbook_dir }}/group_vars/all/vars.yaml"
grafana_mcp_config_file: "{{ playbook_dir }}/../.vscode/mcp.json"
grafana_vault_password_file: "{{ lookup('env', 'HOME') }}/ansible_key"

# Optional admin fallback for brand-new-volume bootstrap (leave empty to use the
# vaulted token only, per the current homelab setup).
grafana_admin_user: ""
grafana_admin_password: ""
