---
# Ensure the Copilot/MCP Grafana service account exists with an Admin token,
# validate the vaulted token, and (when a new token is minted) write it back to
# the vault var and the VS Code MCP config.
#
# Auth model: prefer the existing vaulted token; fall back to admin basic auth
# only if grafana_admin_password is set. All API calls run from the control node
# (delegate_to: localhost) against the grafana host directly on its LAN port, so
# this does not depend on the SWAG proxy being up yet.

- name: Set Grafana API base URL (direct host port)
  ansible.builtin.set_fact:
    _g_base: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ grafana_port }}"

- name: Wait for Grafana API to be healthy
  ansible.builtin.uri:
    url: "{{ _g_base }}/api/health"
    method: GET
    status_code: 200
  register: _g_health
  retries: 30
  delay: 2
  until: _g_health.status == 200
  delegate_to: localhost
  become: false

- name: Validate current vaulted Grafana token
  ansible.builtin.uri:
    url: "{{ _g_base }}/api/serviceaccounts/search?perpage=1&page=1"
    method: GET
    headers:
      Authorization: "Bearer {{ grafana_api_token | default('') }}"
    status_code: [200, 401, 403]
  register: _token_check
  failed_when: false
  no_log: true
  delegate_to: localhost
  become: false

- name: Determine token validity and auth availability
  ansible.builtin.set_fact:
    _token_valid: "{{ (grafana_api_token | default('') | length > 0) and (_token_check.status == 200) }}"
    _have_admin: "{{ grafana_admin_password | default('') | length > 0 }}"

- name: Decide whether the service account setup can authenticate
  ansible.builtin.set_fact:
    _can_auth: "{{ _token_valid or _have_admin }}"

- name: Warn when no usable credential is available (brand-new volume)
  ansible.builtin.debug:
    msg: >-
      Grafana service account setup skipped: the vaulted token does not
      authenticate and no grafana_admin_password is set. Seed a token manually
      or set grafana_admin_user/grafana_admin_password to enable self-healing.
  when: not _can_auth

- name: Service account setup
  when: _can_auth
  block:
    - name: Build auth header (prefer valid token, else admin basic auth)
      ansible.builtin.set_fact:
        _g_headers: >-
          {{ {'Authorization': 'Bearer ' ~ grafana_api_token}
             if _token_valid
             else {'Authorization': 'Basic ' ~ ((grafana_admin_user ~ ':' ~ grafana_admin_password) | b64encode)} }}
      no_log: true

    - name: Search for the service account by name
      ansible.builtin.uri:
        url: "{{ _g_base }}/api/serviceaccounts/search?query={{ grafana_service_account_name | urlencode }}"
        method: GET
        headers: "{{ _g_headers }}"
      register: _sa_search
      no_log: true
      delegate_to: localhost
      become: false

    - name: Capture existing service account (if any)
      ansible.builtin.set_fact:
        _sa: "{{ (_sa_search.json.serviceAccounts | default([]) | selectattr('name', 'equalto', grafana_service_account_name) | list | first) | default({}, true) }}"

    - name: Create the service account
      ansible.builtin.uri:
        url: "{{ _g_base }}/api/serviceaccounts"
        method: POST
        headers: "{{ _g_headers }}"
        body_format: json
        body:
          name: "{{ grafana_service_account_name }}"
          role: "{{ grafana_service_account_role }}"
        status_code: [200, 201]
      register: _sa_created
      when: _sa.id is not defined
      no_log: true
      delegate_to: localhost
      become: false

    - name: Resolve service account id
      ansible.builtin.set_fact:
        _sa_id: "{{ _sa.id | default(_sa_created.json.id) }}"

    - name: Ensure the service account has the Admin role
      ansible.builtin.uri:
        url: "{{ _g_base }}/api/serviceaccounts/{{ _sa_id }}"
        method: PATCH
        headers: "{{ _g_headers }}"
        body_format: json
        body:
          role: "{{ grafana_service_account_role }}"
        status_code: [200]
      when: (_sa.role | default('')) != grafana_service_account_role
      no_log: true
      delegate_to: localhost
      become: false

    - name: Decide whether a new token is required
      ansible.builtin.set_fact:
        _need_token: "{{ (grafana_rotate_token | bool) or (not _token_valid) }}"

    - name: Mint and persist a new token
      when: _need_token
      block:
        - name: List existing tokens on the service account
          ansible.builtin.uri:
            url: "{{ _g_base }}/api/serviceaccounts/{{ _sa_id }}/tokens"
            method: GET
            headers: "{{ _g_headers }}"
          register: _sa_tokens
          no_log: true
          delegate_to: localhost
          become: false

        - name: Generate a unique token name (preserves auth during rotation)
          ansible.builtin.set_fact:
            _new_token_name: "{{ grafana_service_account_token_name }} {{ lookup('pipe', 'date +%Y%m%d%H%M%S') }}"

        - name: Create the new service account token
          ansible.builtin.uri:
            url: "{{ _g_base }}/api/serviceaccounts/{{ _sa_id }}/tokens"
            method: POST
            headers: "{{ _g_headers }}"
            body_format: json
            body:
              name: "{{ _new_token_name }}"
            status_code: [200, 201]
          register: _new_token_res
          no_log: true
          delegate_to: localhost
          become: false

        - name: Capture the new token secret
          ansible.builtin.set_fact:
            _new_token: "{{ _new_token_res.json.key }}"
          no_log: true

        - name: Switch auth to the new token
          ansible.builtin.set_fact:
            _g_headers:
              Authorization: "Bearer {{ _new_token }}"
          no_log: true

        - name: Encrypt the new token as an inline vault string
          ansible.builtin.command:
            cmd: >-
              ansible-vault encrypt_string
              --vault-password-file {{ grafana_vault_password_file }}
              --stdin-name grafana_api_token
            stdin: "{{ _new_token }}"
          register: _enc_token
          changed_when: true
          no_log: true
          delegate_to: localhost
          become: false

        - name: Write the encrypted token into group_vars vault
          ansible.builtin.replace:
            path: "{{ grafana_vault_vars_file }}"
            regexp: '(?ms)^grafana_api_token: !vault \|\n(?:[ ]+.*\n)+?(?=\n|\Z)'
            replace: "{{ _enc_token.stdout }}\n"
          delegate_to: localhost
          become: false

        - name: Update the MCP server token in the VS Code config
          ansible.builtin.replace:
            path: "{{ grafana_mcp_config_file }}"
            regexp: '("GRAFANA_SERVICE_ACCOUNT_TOKEN":\s*")[^"]*(")'
            replace: '\g<1>{{ _new_token }}\g<2>'
          when: grafana_update_mcp_config | bool
          no_log: true
          delegate_to: localhost
          become: false

        - name: Remove superseded tokens sharing the base name
          ansible.builtin.uri:
            url: "{{ _g_base }}/api/serviceaccounts/{{ _sa_id }}/tokens/{{ item.id }}"
            method: DELETE
            headers: "{{ _g_headers }}"
            status_code: [200]
          loop: "{{ _sa_tokens.json | default([]) | selectattr('name', 'equalto', grafana_service_account_token_name) | list }}"
          loop_control:
            label: "{{ item.name }}"
          no_log: true
          delegate_to: localhost
          become: false

        - name: Report token rotation
          ansible.builtin.debug:
            msg: >-
              Minted a new Grafana service account token "{{ _new_token_name }}"
              and wrote it back to the vault{{ ' and .vscode/mcp.json' if (grafana_update_mcp_config | bool) else '' }}.
              Restart the Grafana MCP server in VS Code to pick up the new token.
