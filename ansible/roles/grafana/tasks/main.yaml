---
- name: Ensure docker-compose is installed
  ansible.builtin.package:
    name: docker-compose
    state: present

- name: Ensure SNMP MIB tooling is installed (for snmp_exporter generator regenerations)
  ansible.builtin.package:
    name:
      - snmp-mibs-downloader
    state: present
  become: true

- name: Ensure Docker service is running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Setup Grafana stack parent directory
  ansible.builtin.file:
    path: "{{ grafana_parent_folder }}"
    state: directory
    mode: '0755'
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"

- name: Setup Grafana directory
  ansible.builtin.file:
    path: "{{ grafana_folder }}"
    state: directory
    mode: '0755'
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"

- name: Setup Loki directory
  ansible.builtin.file:
    path: "{{ grafana_loki_data_folder }}"
    state: directory
    mode: '0755'
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"

- name: Setup Prometheus directory
  ansible.builtin.file:
    path: "{{ grafana_prometheus_data_folder }}"
    state: directory
    mode: '0755'
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"

- name: Ensure Loki data directory exists
  ansible.builtin.file:
    path: "{{ grafana_loki_data_folder }}"
    state: directory
    mode: '0755'
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"

- name: Ensure Prometheus data directory exists
  ansible.builtin.file:
    path: "{{ grafana_prometheus_data_folder }}"
    state: directory
    mode: '0755'
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"

- name: Setup InfluxDB directory
  ansible.builtin.file:
    path: "{{ grafana_influxdb_data_folder }}"
    state: directory
    mode: '0755'
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"

- name: Setup SNMP Exporter directory
  ansible.builtin.file:
    path: "{{ grafana_snmp_exporter_data_folder }}"
    state: directory
    mode: '0755'
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"

- name: Deploy SNMP Exporter configuration
  ansible.builtin.template:
    src: "templates/snmp_exporter_config.yml.j2"
    dest: "{{ grafana_snmp_exporter_data_folder }}/snmp.yml"
    mode: '0644'
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    force: true
  notify:
    - Start Grafana

- name: Allow Grafana port through UFW
  community.general.ufw:
    rule: allow
    port: "{{ grafana_port }}"
    proto: tcp
  when: ansible_os_family == "Debian"

- name: Allow Loki port through UFW
  community.general.ufw:
    rule: allow
    port: "{{ grafana_loki_port }}"
    proto: tcp
  when: ansible_os_family == "Debian"

- name: Allow Prometheus port through UFW
  community.general.ufw:
    rule: allow
    port: "{{ grafana_prometheus_port }}"
    proto: tcp
  when: ansible_os_family == "Debian"

- name: Allow InfluxDB port through UFW
  community.general.ufw:
    rule: allow
    port: "{{ grafana_influxdb_port }}"
    proto: tcp
  when: ansible_os_family == "Debian"

- name: Allow SNMP Exporter port through UFW
  community.general.ufw:
    rule: allow
    port: "{{ grafana_snmp_exporter_port }}"
    proto: tcp
  when: ansible_os_family == "Debian"

- name: Deploy Prometheus config
  ansible.builtin.template:
    src: "templates/prometheus.yml.j2"
    dest: "{{ grafana_prometheus_data_folder }}/prometheus.yml"
    mode: '0644'
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    force: true

- name: Ensure Grafana provisioning directory exists
  ansible.builtin.file:
    path: "{{ grafana_folder }}/provisioning/datasources"
    state: directory
    mode: '0755'
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"

- name: Deploy Grafana datasources provisioning config
  ansible.builtin.template:
    src: "templates/provisioning_datasources.yaml.j2"
    dest: "{{ grafana_folder }}/provisioning/datasources/datasources.yaml"
    mode: '0644'
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    force: true
  notify:
    - Start Grafana

- name: Ensure Grafana alerting provisioning directory exists
  ansible.builtin.file:
    path: "{{ grafana_folder }}/provisioning/alerting"
    state: directory
    mode: '0755'
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"

- name: Deploy Grafana contact points provisioning config
  ansible.builtin.template:
    src: "templates/provisioning_contactpoints.yaml.j2"
    dest: "{{ grafana_folder }}/provisioning/alerting/contactpoints.yaml"
    mode: '0644'
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    force: true
  notify:
    - Start Grafana

- name: Deploy Grafana notification policies provisioning config
  ansible.builtin.template:
    src: "templates/provisioning_policies.yaml.j2"
    dest: "{{ grafana_folder }}/provisioning/alerting/policies.yaml"
    mode: '0644'
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    force: true
  notify:
    - Start Grafana

- name: Deploy Grafana alert rules provisioning config
  ansible.builtin.template:
    src: "templates/provisioning_alertrules.yaml.j2"
    dest: "{{ grafana_folder }}/provisioning/alerting/alertrules.yaml"
    mode: '0644'
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    force: true
  notify:
    - Start Grafana

- name: Deploy Grafana using Docker Compose
  ansible.builtin.template:
    src: "templates/docker_compose.yaml.j2"
    dest: "{{ grafana_parent_folder }}/docker-compose.yaml"
    mode: '0644'
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    force: true
  notify:
    - Start Grafana

- name: Run docker-compose up
  community.docker.docker_compose_v2:
    project_src: "{{ grafana_parent_folder }}"
    state: present
    remove_orphans: true

# Check if Grafana stack ports are open and listening
- name: Check if Grafana stack ports are open and listening
  community.general.listen_ports_facts:

- name: Assert Grafana stack ports are listening
  ansible.builtin.assert:
    that:
      - grafana_port | int in (ansible_facts.tcp_listen | map(attribute='port') | list)
      - grafana_loki_port | int in (ansible_facts.tcp_listen | map(attribute='port') | list)
      - grafana_prometheus_port | int in (ansible_facts.tcp_listen | map(attribute='port') | list)
      - grafana_influxdb_port | int in (ansible_facts.tcp_listen | map(attribute='port') | list)
    fail_msg: "One or more Grafana stack ports are not open and listening!"
    success_msg: "All Grafana stack ports are open and listening."

# Configure SWAG Internal Proxy
- name: Resolve grafana host IP for proxy configuration
  ansible.builtin.set_fact:
    grafana_proxy_ip: "{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}"
  when: grafana_configure_proxy | default(true)

- name: Deploy Grafana nginx config to SWAG Internal
  ansible.builtin.template:
    src: grafana.subdomain.conf.j2
    dest: "{{ proxy_folder }}/internal/nginx/proxy-confs/grafana.subdomain.conf"
    mode: '0644'
  delegate_to: "{{ groups['proxy_host'][0] }}"
  notify:
    - Restart Swag Internal
  when: grafana_configure_proxy | default(true)

# DNS Configuration
- name: Ensure deployment host DNS override exists
  ansible.builtin.include_tasks:
    file: "{{ playbook_dir }}/tasks/pfsense_dns_ensure_host_override.yaml"
  vars:
    _dns_configure: "{{ grafana_configure_dns | default(true) }}"
  when: grafana_configure_dns | default(true)

- name: Create grafana DNS alias
  ansible.builtin.include_tasks:
    file: "{{ playbook_dir }}/tasks/pfsense_dns_create_alias.yaml"
  vars:
    _dns_configure: "{{ grafana_configure_dns | default(true) }}"
    _dns_alias_host: grafana
    _dns_alias_descr: Grafana monitoring dashboard
    _dns_is_proxied: true
  when: grafana_configure_dns | default(true)

# Configure Homepage Services
- name: Add grafana service to Homepage Infra section
  ansible.builtin.include_tasks:
    file: "{{ playbook_dir }}/tasks/homepage_add_service.yaml"
  vars:
    _homepage_service_name: Grafana
    _homepage_marker: grafana service
    _homepage_template: grafana_service.yaml.j2
    _homepage_insertafter: "^- Infra:"
  when: grafana_configure_homepage | default(true)
  tags:
    - homepage
    - homepage_config

- name: Notify Homepage restart for grafana
  ansible.builtin.debug:
    msg: "grafana homepage entry updated"
  changed_when: _homepage_service_result is changed
  notify:
    - Restart Homepage
  when: grafana_configure_homepage | default(true)
  tags:
    - homepage
    - homepage_config
