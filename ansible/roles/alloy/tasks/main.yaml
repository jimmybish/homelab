---
- name: Install GPG (required for apt key)
  ansible.builtin.apt:
    name: gpg
    state: present

- name: Create Grafana apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Grafana GPG key
  ansible.builtin.get_url:
    url: https://apt.grafana.com/gpg-full.key
    dest: /etc/apt/keyrings/grafana.asc
    mode: '0644'

- name: Add Grafana apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/grafana.asc] https://apt.grafana.com stable main"
    filename: grafana
    state: present

- name: Install Alloy package
  ansible.builtin.apt:
    name: alloy
    state: present
    update_cache: true

- name: Check if docker group exists
  ansible.builtin.getent:
    database: group
    key: docker
  register: docker_group
  ignore_errors: true

- name: Add alloy user to docker group
  ansible.builtin.user:
    name: alloy
    groups: docker
    append: true
  when: docker_group is succeeded
  notify: Restart Alloy

- name: Add alloy user to systemd-journal group
  ansible.builtin.user:
    name: alloy
    groups: systemd-journal
    append: true
  notify: Restart Alloy

- name: Deploy Alloy configuration
  ansible.builtin.template:
    src: alloy_config.alloy.j2
    dest: "{{ alloy_config_file }}"
    mode: '0644'
    owner: root
    group: root
  notify: Restart Alloy

- name: Configure Alloy environment file
  ansible.builtin.template:
    src: alloy_env.j2
    dest: "{{ alloy_env_file }}"
    mode: '0644'
    owner: root
    group: root
  notify: Restart Alloy

- name: Enable and start Alloy service
  ansible.builtin.systemd:
    name: alloy
    state: started
    enabled: true
