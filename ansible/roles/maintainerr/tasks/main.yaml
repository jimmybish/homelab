---
# Docker Prerequisites
- name: Ensure docker-compose is installed
  ansible.builtin.package:
    name: docker-compose
    state: present

- name: Ensure Docker service is running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

# Directory Setup
- name: Setup Maintainerr directory
  ansible.builtin.file:
    path: "{{ maintainerr_folder }}"
    state: directory
    mode: '0755'
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"

# Firewall Configuration (REQUIRED for web interface)
- name: Allow Maintainerr port through UFW
  community.general.ufw:
    rule: allow
    port: "{{ maintainerr_port }}"
    proto: tcp
  when: ansible_os_family == "Debian"

# Deploy Configuration Files
- name: Deploy Maintainerr using Docker Compose
  ansible.builtin.template:
    src: "templates/docker_compose.yaml.j2"
    dest: "{{ maintainerr_folder }}/docker-compose.yaml"
    mode: '0644'
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    force: true
  notify:
    - Start Maintainerr

- name: Run docker-compose up
  community.docker.docker_compose_v2:
    project_src: "{{ maintainerr_folder }}"
    state: present
    remove_orphans: true

# Health Check
- name: Check if service ports are open and listening
  community.general.listen_ports_facts:

- name: Assert Maintainerr port is listening
  ansible.builtin.assert:
    that:
      - maintainerr_port | int in (ansible_facts.tcp_listen | map(attribute='port') | list)
    fail_msg: "Maintainerr port is not open and listening!"
    success_msg: "Maintainerr port is open and listening."

# Configure SWAG Internal Proxy (REQUIRED for web interfaces)
- name: Resolve service host IP for proxy configuration
  ansible.builtin.set_fact:
    maintainerr_proxy_ip: "{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}"

- name: Deploy Maintainerr nginx config to SWAG Internal
  ansible.builtin.template:
    src: maintainerr.subdomain.conf.j2
    dest: "{{ proxy_folder }}/internal/nginx/proxy-confs/maintainerr.subdomain.conf"
    mode: '0644'
  delegate_to: "{{ groups['proxy_host'][0] }}"
  notify:
    - Restart Swag Internal

# DNS Configuration (REQUIRED for web interfaces)
- name: Ensure deployment host DNS override exists
  ansible.builtin.include_tasks:
    file: "{{ playbook_dir }}/tasks/pfsense_dns_ensure_host_override.yaml"
  vars:
    _dns_configure: "{{ maintainerr_configure_dns | default(true) }}"
  when: maintainerr_configure_dns | default(true)

- name: Create maintainerr DNS alias
  ansible.builtin.include_tasks:
    file: "{{ playbook_dir }}/tasks/pfsense_dns_create_alias.yaml"
  vars:
    _dns_configure: "{{ maintainerr_configure_dns | default(true) }}"
    _dns_alias_host: maintainerr
    _dns_alias_descr: Media maintenance and cleanup automation
    _dns_is_proxied: "{{ maintainerr_is_proxied | default(true) }}"
  when: maintainerr_configure_dns | default(true)

# Configure Homepage Services (REQUIRED for web interfaces)
- name: Add Maintainerr to Homepage section
  ansible.builtin.include_tasks:
    file: "{{ playbook_dir }}/tasks/homepage_add_service.yaml"
  vars:
    _homepage_service_name: Maintainerr
    _homepage_marker: maintainerr service
    _homepage_template: maintainerr_service.yaml.j2
    _homepage_insertafter: "^- ARR:"
  when: maintainerr_configure_homepage | default(true)
  tags:
    - homepage
    - homepage_config

- name: Notify Homepage restart for maintainerr
  ansible.builtin.debug:
    msg: "maintainerr homepage entry updated"
  changed_when: _homepage_service_result is changed
  notify:
    - Restart Homepage
  when: maintainerr_configure_homepage | default(true)
  tags:
    - homepage
    - homepage_config
