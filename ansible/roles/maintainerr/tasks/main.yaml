---
# Docker Prerequisites
- name: Ensure docker-compose is installed
  ansible.builtin.package:
    name: docker-compose
    state: present

- name: Ensure Docker service is running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

# Directory Setup
- name: Setup Maintainerr directory
  ansible.builtin.file:
    path: "{{ maintainerr_folder }}"
    state: directory
    mode: '0755'
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"

# Firewall Configuration (REQUIRED for web interface)
- name: Allow Maintainerr port through UFW
  community.general.ufw:
    rule: allow
    port: "{{ maintainerr_port }}"
    proto: tcp
  when: ansible_os_family == "Debian"

# Deploy Configuration Files
- name: Deploy Maintainerr using Docker Compose
  ansible.builtin.template:
    src: "templates/docker_compose.yaml.j2"
    dest: "{{ maintainerr_folder }}/docker-compose.yaml"
    mode: '0644'
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    force: true
  notify:
    - Start Maintainerr

- name: Run docker-compose up
  community.docker.docker_compose_v2:
    project_src: "{{ maintainerr_folder }}"
    state: present
    remove_orphans: true

# Health Check
- name: Check if service ports are open and listening
  community.general.listen_ports_facts:

- name: Assert Maintainerr port is listening
  ansible.builtin.assert:
    that:
      - maintainerr_port | int in (ansible_facts.tcp_listen | map(attribute='port') | list)
    fail_msg: "Maintainerr port is not open and listening!"
    success_msg: "Maintainerr port is open and listening."

# Configure SWAG Internal Proxy (REQUIRED for web interfaces)
- name: Resolve service host IP for proxy configuration
  ansible.builtin.set_fact:
    maintainerr_proxy_ip: "{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}"

- name: Deploy Maintainerr nginx config to SWAG Internal
  ansible.builtin.template:
    src: maintainerr.subdomain.conf.j2
    dest: "{{ proxy_folder }}/internal/nginx/proxy-confs/maintainerr.subdomain.conf"
    mode: '0644'
  delegate_to: "{{ groups['proxy_host'][0] }}"
  notify:
    - Restart Swag Internal

# DNS Configuration (REQUIRED for web interfaces)
- name: Get DNS resolver host overrides from pfSense
  ansible.builtin.uri:
    url: "https://{{ groups['pfsense_host'][0] }}/api/v2/services/dns_resolver/host_overrides"
    method: GET
    headers:
      X-API-Key: "{{ pfsense_api_key }}"
    validate_certs: false
    return_content: true
  register: pfsense_dns_overrides
  delegate_to: localhost
  when: maintainerr_configure_dns | default(true)

- name: Find deployment host override entry in pfSense
  ansible.builtin.set_fact:
    deployment_host_override: >-
      {{ pfsense_dns_overrides.json.data
         | selectattr('host', 'equalto', inventory_hostname.split('.')[0])
         | selectattr('domain', 'equalto', internal_domain)
         | list
         | first
         | default({}) }}
  when:
    - maintainerr_configure_dns | default(true)
    - pfsense_dns_overrides.json.data is defined

- name: Create host override for deployment target if missing
  ansible.builtin.uri:
    url: "https://{{ groups['pfsense_host'][0] }}/api/v2/services/dns_resolver/host_override"
    method: POST
    headers:
      X-API-Key: "{{ pfsense_api_key }}"
      Content-Type: "application/json"
    body_format: json
    body:
      host: "{{ inventory_hostname.split('.')[0] }}"
      domain: "{{ internal_domain }}"
      ip: ["{{ ansible_default_ipv4.address }}"]
      descr: "{{ inventory_hostname.split('.')[0] | title }} host"
    validate_certs: false
    status_code: [200, 201]
  delegate_to: localhost
  register: host_override_creation
  when:
    - maintainerr_configure_dns | default(true)
    - deployment_host_override | length == 0

- name: Apply DNS resolver changes after host override creation
  ansible.builtin.uri:
    url: "https://{{ groups['pfsense_host'][0] }}/api/v2/services/dns_resolver/apply"
    method: POST
    headers:
      X-API-Key: "{{ pfsense_api_key }}"
    validate_certs: false
    status_code: [200, 201]
  delegate_to: localhost
  when:
    - maintainerr_configure_dns | default(true)
    - host_override_creation is succeeded

- name: Refresh DNS resolver host overrides after creation
  ansible.builtin.uri:
    url: "https://{{ groups['pfsense_host'][0] }}/api/v2/services/dns_resolver/host_overrides"
    method: GET
    headers:
      X-API-Key: "{{ pfsense_api_key }}"
    validate_certs: false
    return_content: true
  register: pfsense_dns_overrides
  delegate_to: localhost
  when:
    - maintainerr_configure_dns | default(true)
    - host_override_creation is succeeded

- name: Re-find deployment host override entry in pfSense
  ansible.builtin.set_fact:
    deployment_host_override: >-
      {{ pfsense_dns_overrides.json.data
         | selectattr('host', 'equalto', inventory_hostname.split('.')[0])
         | selectattr('domain', 'equalto', internal_domain)
         | list
         | first
         | default({}) }}
  when:
    - maintainerr_configure_dns | default(true)
    - host_override_creation is succeeded

- name: Find proxy host override entry in pfSense
  ansible.builtin.set_fact:
    proxy_host_override: >-
      {{ pfsense_dns_overrides.json.data
         | selectattr('host', 'equalto', 'proxy')
         | selectattr('domain', 'equalto', internal_domain)
         | list
         | first
         | default({}) }}
  when:
    - maintainerr_configure_dns | default(true)
    - maintainerr_is_proxied | default(true)
    - pfsense_dns_overrides.json.data is defined

- name: Set parent host override for service alias
  ansible.builtin.set_fact:
    maintainerr_parent_override: "{{ proxy_host_override if (maintainerr_is_proxied | default(true)) else deployment_host_override }}"
  when:
    - maintainerr_configure_dns | default(true)

- name: Find all existing aliases for Maintainerr across all host overrides
  ansible.builtin.set_fact:
    maintainerr_all_existing_aliases: >-
      {{ pfsense_dns_overrides.json.data
         | selectattr('aliases', 'defined')
         | map(attribute='aliases')
         | flatten
         | selectattr('host', 'equalto', 'maintainerr')
         | selectattr('domain', 'equalto', internal_domain)
         | list }}
  when:
    - maintainerr_configure_dns | default(true)
    - pfsense_dns_overrides.json.data is defined

- name: Identify aliases to delete (not under correct parent)
  ansible.builtin.set_fact:
    maintainerr_aliases_to_delete: >-
      {{ maintainerr_all_existing_aliases
         | rejectattr('parent_id', 'equalto', maintainerr_parent_override.id | default(0))
         | list }}
  when:
    - maintainerr_configure_dns | default(true)
    - maintainerr_all_existing_aliases is defined

- name: Delete incorrect Maintainerr DNS aliases
  ansible.builtin.uri:
    url: "https://{{ groups['pfsense_host'][0] }}/api/v2/services/dns_resolver/host_override/alias"
    method: DELETE
    headers:
      X-API-Key: "{{ pfsense_api_key }}"
      Content-Type: "application/json"
    body_format: json
    body:
      parent_id: "{{ item.parent_id }}"
      id: "{{ item.id }}"
      apply: false
    validate_certs: false
    status_code: [200, 204]
  delegate_to: localhost
  loop: "{{ maintainerr_aliases_to_delete }}"
  register: maintainerr_delete_results
  when:
    - maintainerr_configure_dns | default(true)
    - maintainerr_aliases_to_delete is defined
    - maintainerr_aliases_to_delete | length > 0

- name: Apply DNS resolver changes after deletion
  ansible.builtin.uri:
    url: "https://{{ groups['pfsense_host'][0] }}/api/v2/services/dns_resolver/apply"
    method: POST
    headers:
      X-API-Key: "{{ pfsense_api_key }}"
    validate_certs: false
    status_code: [200, 201]
  delegate_to: localhost
  when:
    - maintainerr_configure_dns | default(true)
    - maintainerr_delete_results is changed

- name: Check if Maintainerr alias exists under parent host override
  ansible.builtin.set_fact:
    maintainerr_alias_exists: >-
      {{ maintainerr_parent_override.aliases | default([])
         | selectattr('host', 'equalto', 'maintainerr')
         | selectattr('domain', 'equalto', internal_domain)
         | list
         | length > 0 }}
  when:
    - maintainerr_configure_dns | default(true)
    - maintainerr_parent_override is defined
    - maintainerr_parent_override | length > 0

- name: Display Maintainerr DNS alias status
  ansible.builtin.debug:
    msg: >-
      {% if maintainerr_parent_override | length == 0 %}
      Warning: Parent host override not found in pfSense DNS
      {% elif maintainerr_alias_exists %}
      Maintainerr DNS alias exists under {{ maintainerr_parent_override.host }}.{{ internal_domain }}
      {% else %}
      Maintainerr DNS alias missing - will be created under {{ maintainerr_parent_override.host }}.{{ internal_domain }}
      {% endif %}
  when: maintainerr_configure_dns | default(true)

- name: Create Maintainerr DNS alias under parent host override
  ansible.builtin.uri:
    url: "https://{{ groups['pfsense_host'][0] }}/api/v2/services/dns_resolver/host_override/alias"
    method: POST
    headers:
      X-API-Key: "{{ pfsense_api_key }}"
      Content-Type: "application/json"
    body_format: json
    body:
      parent_id: "{{ maintainerr_parent_override.id }}"
      host: "maintainerr"
      domain: "{{ internal_domain }}"
      descr: "Media maintenance and cleanup automation"
    validate_certs: false
    status_code: [200, 201]
  delegate_to: localhost
  register: maintainerr_alias_result
  when:
    - maintainerr_configure_dns | default(true)
    - maintainerr_parent_override | length > 0
    - not maintainerr_alias_exists

- name: Apply DNS resolver changes in pfSense
  ansible.builtin.uri:
    url: "https://{{ groups['pfsense_host'][0] }}/api/v2/services/dns_resolver/apply"
    method: POST
    headers:
      X-API-Key: "{{ pfsense_api_key }}"
    validate_certs: false
    status_code: [200, 201]
  delegate_to: localhost
  when:
    - maintainerr_configure_dns | default(true)
    - (maintainerr_alias_result is succeeded or host_override_creation is succeeded)

# Configure Homepage Services (REQUIRED for web interfaces)
- name: Add Maintainerr to Homepage section
  ansible.builtin.blockinfile:
    path: "{{ homepage_folder }}/config/services.yaml"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - maintainerr service"
    block: "{{ lookup('template', 'homepage_service.yaml.j2') }}"
    insertafter: "^- ARR:"
    mode: '0644'
  delegate_to: "{{ groups['homepage_host'][0] }}"
  notify:
    - Restart Homepage
  when: maintainerr_configure_homepage | default(true)
  tags:
    - homepage
    - homepage_config
