---
# Research and Documentation
# Paperless-ngx: https://docs.paperless-ngx.com/
# - Open source document management system
# - PostgreSQL database: https://www.postgresql.org/
# - Redis broker: https://redis.io/
# - Gotenberg (document conversion): https://gotenberg.dev/
# - Apache Tika (text extraction): https://tika.apache.org/

paperless_ngx_version: "latest"
paperless_ngx_redis_version: "7"
paperless_ngx_postgres_version: "16"
paperless_ngx_gotenberg_version: "8.7"
paperless_ngx_tika_version: "latest"

# External port
paperless_ngx_port: 8000

# Volume paths
paperless_ngx_folder: "{{ docker_storage_folder }}/paperless"

# Feature flags
paperless_ngx_configure_dns: true
paperless_ngx_configure_proxy: true
paperless_ngx_configure_homepage: true
