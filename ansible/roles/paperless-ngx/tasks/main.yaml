---
- name: Ensure docker-compose is installed
  ansible.builtin.package:
    name: docker-compose
    state: present

- name: Ensure Docker service is running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Get fileserver IP
  ansible.builtin.set_fact:
    paperless_fileserver_ip: "{{ (lookup('ansible.builtin.inventory_hostnames', 'qnap').split(','))[0] }}"

- name: Get proxy IP
  ansible.builtin.set_fact:
    paperless_trusted_proxies: "{{ (lookup('ansible.builtin.inventory_hostnames', 'proxy').split(','))[0] }}"

- name: Setup directory
  ansible.builtin.file:
    path: "{{ paperless_folder }}"
    state: directory
    mode: '0755'
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"

- name: Allow Paperless port through UFW
  community.general.ufw:
    rule: allow
    port: "{{ paperless_port }}"
    proto: tcp
  when: ansible_os_family == "Debian"

- name: Deploy Paperless using Docker Compose
  ansible.builtin.template:
    src: "templates/docker_compose.yaml.j2"
    dest: "{{ paperless_folder }}/docker-compose.yaml"
    mode: '0644'
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    force: true
  notify:
    - Start Paperless

- name: Run Paperless docker-compose up
  community.docker.docker_compose_v2:
    project_src: "{{ paperless_folder }}"
    state: present
    remove_orphans: true

# Check if Paperless port is open and listening
- name: Check if Paperless port is open and listening
  community.general.listen_ports_facts:

- name: Assert Paperless port is listening
  ansible.builtin.assert:
    that:
      - paperless_port | int in (ansible_facts.tcp_listen | map(attribute='port') | list)
    fail_msg: "Paperless port {{ paperless_port }} is not open and listening!"
    success_msg: "Paperless port {{ paperless_port }} is open and listening."

# Proxy Configuration
- name: Configure nginx proxy for paperless
  when: paperless_configure_proxy | default(true)
  block:
    - name: Get paperless host IP for proxy
      ansible.builtin.set_fact:
        paperless_proxy_ip: "{{ ansible_default_ipv4.address }}"

    - name: Deploy paperless nginx proxy config
      ansible.builtin.template:
        src: "templates/paperless.subdomain.conf.j2"
        dest: "{{ proxy_folder }}/internal/nginx/proxy-confs/paperless.subdomain.conf"
        mode: '0644'
        owner: "{{ docker_user }}"
        group: "{{ docker_user }}"
      delegate_to: "{{ groups['proxy_host'][0] }}"
      notify: Restart Swag Internal

# DNS Configuration
- name: Ensure deployment host DNS override exists
  ansible.builtin.include_tasks:
    file: "{{ playbook_dir }}/tasks/pfsense_dns_ensure_host_override.yaml"
  vars:
    _dns_configure: "{{ paperless_configure_dns | default(true) }}"
  when: paperless_configure_dns | default(true)

- name: Create paperless DNS alias
  ansible.builtin.include_tasks:
    file: "{{ playbook_dir }}/tasks/pfsense_dns_create_alias.yaml"
  vars:
    _dns_configure: "{{ paperless_configure_dns | default(true) }}"
    _dns_alias_host: paperless
    _dns_alias_descr: Paperless-NGX document management
    _dns_is_proxied: true
  when: paperless_configure_dns | default(true)

# Homepage Configuration
- name: Add paperless service to Homepage Smart Home section
  ansible.builtin.include_tasks:
    file: "{{ playbook_dir }}/tasks/homepage_add_service.yaml"
  vars:
    _homepage_service_name: Paperless-NGX
    _homepage_marker: paperless
    _homepage_template: paperless_service.yaml.j2
    _homepage_insertafter: "^- Smart Home:"
  when: paperless_configure_homepage | default(true)
  tags:
    - homepage
    - homepage_config

- name: Notify Homepage restart for paperless
  ansible.builtin.debug:
    msg: "paperless homepage entry updated"
  changed_when: _homepage_service_result is changed
  notify: Restart Homepage
  when: paperless_configure_homepage | default(true)
  tags:
    - homepage
    - homepage_config
