---
- name: Set Docker apt repository for correct distribution
  ansible.builtin.set_fact:
    docker_apt_repository: >-
      {{
        'deb [arch=amd64] https://download.docker.com/linux/ubuntu ' ~ ansible_distribution_release ~ ' stable'
        if ansible_distribution == 'Ubuntu'
        else 'deb [arch=amd64] https://download.docker.com/linux/debian ' ~ ansible_distribution_release ~ ' stable'
      }}

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Ensure the docker user group exists for LinuxServer containers
  ansible.builtin.group:
    name: "{{ docker_user }}"
    state: present
    gid: 2001

- name: Add the docker user to the group
  ansible.builtin.user:
    name: "{{ docker_user }}"
    comment: Docker User
    uid: 2001
    group: "{{ docker_user }}"

- name: Create Docker data folder
  ansible.builtin.file:
    path: /etc/docker-storage
    state: directory
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0755"

- name: Ensure apt is using HTTPS
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
  loop:
    - apt-transport-https
    - ca-certificates
    - curl
    - software-properties-common

- name: Add Docker GPG key
  ansible.builtin.apt_key:
    url: "https://download.docker.com/linux/{{ 'ubuntu' if ansible_distribution == 'Ubuntu' else 'debian' }}/gpg"
    state: present

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "{{ docker_apt_repository }}"
    state: present
    filename: docker
    update_cache: true

- name: Install Docker CE
  ansible.builtin.apt:
    name: docker-ce
    state: present
    update_cache: true

- name: Configure Docker daemon options
  ansible.builtin.template:
    src: "templates/docker_daemon.json.j2"
    dest: "/etc/docker/daemon.json"
    owner: 'root'
    group: 'root'
    mode: '0755'
  notify: Restart Docker

- name: Ensure Docker service is enabled and running
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Deploy Docker image cleanup script
  ansible.builtin.template:
    src: "templates/docker_image_cleanup.sh.j2"
    dest: "/usr/local/bin/docker-image-cleanup.sh"
    owner: 'root'
    group: 'root'
    mode: '0755'

- name: Schedule weekly Docker image cleanup
  ansible.builtin.cron:
    name: "Docker image cleanup"
    job: "/usr/local/bin/docker-image-cleanup.sh >> /var/log/docker-image-cleanup.log 2>&1"
    weekday: "3"
    hour: "3"
    minute: "0"
    user: "root"

# cAdvisor - container monitoring for Prometheus
# Skipped on LXC containers as cAdvisor requires /proc mount access
- name: Allow cAdvisor port through UFW
  community.general.ufw:
    rule: allow
    port: "{{ docker_cadvisor_port }}"
    proto: tcp
  when:
    - ansible_os_family == "Debian"
    - ansible_virtualization_type != "lxc"

- name: Run cAdvisor container
  community.docker.docker_container:
    name: cadvisor
    image: gcr.io/cadvisor/cadvisor:latest
    state: started
    restart_policy: unless-stopped
    ports:
      - "{{ docker_cadvisor_port }}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
  when: ansible_virtualization_type != "lxc"
