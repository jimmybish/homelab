---
- name: Silence Grafana alerts during Ubuntu updates
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Create Grafana silence
      ansible.builtin.include_tasks: tasks/grafana_create_silence.yaml
      vars:
        grafana_silence_comment: "Updating and rebooting Ubuntu hosts"

- name: Update, upgrade, and reboot all Ubuntu hosts
  hosts: "ubuntu"
  become: true
  serial: 1

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Upgrade all packages
      ansible.builtin.apt:
        upgrade: dist
      register: upgrade_result
      notify: Reboot the host

  handlers:
    - name: Reboot the host
      ansible.builtin.reboot:
      when: upgrade_result.changed
      notify: Wait for the host to come back online

    - name: Wait for the host to come back online
      ansible.builtin.wait_for_connection:
        timeout: 300
      when: upgrade_result.changed

- name: Re-enable Grafana alerts after Ubuntu updates
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Remove Grafana silence
      ansible.builtin.include_tasks: tasks/grafana_remove_silence.yaml
