---
# Shared task file: Populate Homepage with all service entries.
# Included via: ansible.builtin.include_tasks: tasks/homepage_populate_all_services.yaml
#
# Calls homepage_add_service.yaml once per service to insert blockinfile entries
# into Homepage's services.yaml. Order matters: arr_suite creates the ARR section
# that maintainerr inserts into, so arr_suite must come first.

# --- Media section ---

- name: "Homepage config: Plex"
  ansible.builtin.include_tasks:
    file: homepage_add_service.yaml
  vars:
    _homepage_service_name: Plex
    _homepage_marker: plex services
    _homepage_template: plex_services.yaml.j2
    _homepage_insertafter: "^- Media:"
  when: plex_configure_homepage | default(true)
  tags:
    - homepage
    - homepage_config

- name: "Homepage config: Jellyfin"
  ansible.builtin.include_tasks:
    file: homepage_add_service.yaml
  vars:
    _homepage_service_name: Jellyfin
    _homepage_marker: jellyfin services
    _homepage_template: jellyfin_services.yaml.j2
    _homepage_insertafter: "^- Media:"
  when: jellyfin_configure_homepage | default(true)
  tags:
    - homepage
    - homepage_config

- name: "Homepage config: Jellyseerr"
  ansible.builtin.include_tasks:
