---
# Shared task: Ensure the deployment host has a DNS host override in pfSense.
# Included via: ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/pfsense_dns_ensure_host_override.yaml"
#
# Required input variables:
#   _dns_configure  — master flag to enable/disable DNS configuration (bool)
#
# Output facts (available after include returns):
#   _dns_overrides_data       — list of pfSense DNS host override entries
#   _dns_deployment_override  — the host override entry for the deployment target

- name: Get DNS resolver host overrides from pfSense
  ansible.builtin.uri:
    url: "https://{{ groups['pfsense_host'][0] }}/api/v2/services/dns_resolver/host_overrides"
    method: GET
    headers:
      X-API-Key: "{{ pfsense_api_key }}"
    validate_certs: false
    return_content: true
  register: _dns_overrides_raw
  delegate_to: localhost
  when: _dns_configure | bool

- name: Store DNS overrides as host fact
  ansible.builtin.set_fact:
    _dns_overrides_data: "{{ _dns_overrides_raw.json.data }}"
  when:
    - _dns_configure | bool
    - _dns_overrides_raw.json.data is defined

- name: Find deployment host override in pfSense
  ansible.builtin.set_fact:
    _dns_deployment_override: >-
      {{ _dns_overrides_data
         | selectattr('host', 'equalto', inventory_hostname.split('.')[0])
         | selectattr('domain', 'equalto', internal_domain)
         | list
         | first
         | default({}) }}
  when:
    - _dns_configure | bool
    - _dns_overrides_data is defined

- name: Create host override for deployment target if missing
  ansible.builtin.uri:
    url: "https://{{ groups['pfsense_host'][0] }}/api/v2/services/dns_resolver/host_override"
    method: POST
    headers:
      X-API-Key: "{{ pfsense_api_key }}"
      Content-Type: "application/json"
    body_format: json
    body:
      host: "{{ inventory_hostname.split('.')[0] }}"
      domain: "{{ internal_domain }}"
      ip: ["{{ ansible_default_ipv4.address }}"]
      descr: "{{ inventory_hostname.split('.')[0] | title }} host"
    validate_certs: false
    status_code: [200, 201]
  delegate_to: localhost
  register: _dns_host_override_result
  when:
    - _dns_configure | bool
    - _dns_deployment_override | length == 0

- name: Apply DNS changes after host override creation
  ansible.builtin.uri:
    url: "https://{{ groups['pfsense_host'][0] }}/api/v2/services/dns_resolver/apply"
    method: POST
    headers:
      X-API-Key: "{{ pfsense_api_key }}"
    validate_certs: false
    status_code: [200, 201]
  delegate_to: localhost
  when:
    - _dns_configure | bool
    - _dns_host_override_result is not skipped

- name: Refresh DNS overrides after host override creation
  ansible.builtin.uri:
    url: "https://{{ groups['pfsense_host'][0] }}/api/v2/services/dns_resolver/host_overrides"
    method: GET
    headers:
      X-API-Key: "{{ pfsense_api_key }}"
    validate_certs: false
    return_content: true
  register: _dns_overrides_raw
  delegate_to: localhost
  when:
    - _dns_configure | bool
    - _dns_host_override_result is not skipped

- name: Update DNS overrides fact after refresh
  ansible.builtin.set_fact:
    _dns_overrides_data: "{{ _dns_overrides_raw.json.data }}"
  when:
    - _dns_configure | bool
    - _dns_host_override_result is not skipped
    - _dns_overrides_raw.json.data is defined

- name: Re-find deployment host override after creation
  ansible.builtin.set_fact:
    _dns_deployment_override: >-
      {{ _dns_overrides_data
         | selectattr('host', 'equalto', inventory_hostname.split('.')[0])
         | selectattr('domain', 'equalto', internal_domain)
         | list
         | first
         | default({}) }}
  when:
    - _dns_configure | bool
    - _dns_host_override_result is not skipped
