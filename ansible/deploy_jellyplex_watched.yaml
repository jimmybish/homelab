---
- name: Install JellyPlex-Watched
  hosts: jellyplex_watched_host
  become: true
  pre_tasks:
    - name: Silence Grafana alerts
      ansible.builtin.include_tasks: tasks/grafana_create_silence.yaml
      vars:
        grafana_silence_comment: "Deploying JellyPlex-Watched"
      when: not (hostvars['localhost']['grafana_master_silence_active'] | default(false))
  roles:
    - jellyplex_watched
  post_tasks:
    - name: Remove Grafana alert silence
      ansible.builtin.include_tasks: tasks/grafana_remove_silence.yaml
      when: not (hostvars['localhost']['grafana_master_silence_active'] | default(false))
